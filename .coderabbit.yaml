language: "ja"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "develop"
      - "main"
  path_instructions:
    - path: "apps/web/**/*.{ts,tsx}"
      instructions: |
        - This site uses SSG; all `fetch` calls must use `{ cache: 'force-cache' }`
    - path: "apps/web/app/**/page.tsx"
      instructions: |
        - `params` is a Promise in Next.js 15 — always `await params` before use
        - `cookies()` and `headers()` are async — always await them
    - path: "apps/storybook/**/*.stories.{ts,tsx}"
      instructions: |
        - Use `satisfies Meta<typeof Component>` and define props via `args`
        - Include a `Default` story and stories for key states
